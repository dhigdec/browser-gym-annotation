# Full local stack: postgres + backend API + frontend (nginx) + adminer.
# Postgres is published on host :5433 to avoid clashing with a native brew
# Postgres on :5432. Requires Docker Desktop running.
#   docker compose -f infra/docker-compose.yml up --build
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-annotator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-annotator}
      POSTGRES_DB: ${POSTGRES_DB:-browser_gym_annotator}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-annotator}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ../backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-annotator}:${POSTGRES_PASSWORD:-annotator}@postgres:5432/${POSTGRES_DB:-browser_gym_annotator}
      CORS_ORIGINS: '["http://localhost:8080"]'
      ENV: dev
      # Live agent re-run (M6b). Set ANTHROPIC_API_KEY in your shell or infra/.env
      # (gitignored) — passed through at runtime, never baked into the image.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AGENT_MODEL: ${AGENT_MODEL:-claude-haiku-4-5-20251001}
      # Live gym (M6c). The gym runs on the host; reach it via host.docker.internal.
      GYM_URL: ${GYM_URL:-http://host.docker.internal:8000}
      # The live browser runs on the HOST (it owns a Chromium), so the composed
      # backend reaches it the same way it reaches the gym. Without this the
      # default localhost:8877 resolves inside the container, where nothing is
      # listening, and every attempt to open a live browser 409s.
      LIVE_BROWSER_URL: ${LIVE_BROWSER_URL:-http://host.docker.internal:8877}
      # …and the browser is on the host, so it must be told the gym's HOST-side
      # name. host.docker.internal is meaningful only inside this container.
      GYM_HOST_FOR_BROWSER: ${GYM_HOST_FOR_BROWSER:-localhost}
      GYM_HARNESS_TOKEN: ${GYM_HARNESS_TOKEN:-}
      # Rerun cap (§3.9): three agent runs per ATTEMPT, then the annotator
      # finishes by hand — the path tests/test_e2e_correction_loop.py walks end to
      # end. Set here rather than in app/config.py so running from source stays
      # uncapped: capping reruns anywhere the manual fallback has not been
      # exercised strands whoever hits it. AGENT_RUN_CAP=0 turns it back off.
      AGENT_RUN_CAP: ${AGENT_RUN_CAP:-3}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8090:8090"

  frontend:
    build: ../frontend
    depends_on:
      - backend
    ports:
      - "8080:8080"

  adminer:
    image: adminer
    depends_on:
      - postgres
    ports:
      - "8081:8080"

volumes:
  pgdata:
